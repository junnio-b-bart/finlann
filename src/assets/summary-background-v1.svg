<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#040A22" />
      <stop offset="58%" stop-color="#02061A" />
      <stop offset="100%" stop-color="#010412" />
    </linearGradient>

    <radialGradient id="glowTop" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#2C7CFF" stop-opacity="0.16" />
      <stop offset="100%" stop-color="#2C7CFF" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="glowRight" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#30E8C4" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#30E8C4" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="glowBottom" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#17B88E" stop-opacity="0.14" />
      <stop offset="100%" stop-color="#17B88E" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="waveMain" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#21468F" stop-opacity="0.2" />
      <stop offset="55%" stop-color="#22C9A5" stop-opacity="0.52" />
      <stop offset="100%" stop-color="#73F8D7" stop-opacity="0.48" />
    </linearGradient>

    <linearGradient id="waveSub" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A3675" stop-opacity="0.14" />
      <stop offset="100%" stop-color="#3178FF" stop-opacity="0.2" />
    </linearGradient>

    <filter id="dotBlur" x="-220%" y="-220%" width="440%" height="440%">
      <feGaussianBlur stdDeviation="4.2" />
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)" />

  <ellipse cx="860" cy="1420" rx="380" ry="340" fill="url(#glowBottom)">
    <animate attributeName="cy" values="1430;1390;1430" dur="16s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.8;1;0.8" dur="16s" repeatCount="indefinite" />
  </ellipse>

  <ellipse cx="160" cy="260" rx="260" ry="210" fill="url(#glowTop)" opacity="0.9">
    <animate attributeName="cx" values="140;190;140" dur="18s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.75;1;0.75" dur="18s" repeatCount="indefinite" />
  </ellipse>

  <ellipse cx="980" cy="860" rx="220" ry="360" fill="url(#glowRight)" opacity="0.85">
    <animate attributeName="cy" values="880;820;880" dur="14s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.7;1;0.7" dur="14s" repeatCount="indefinite" />
  </ellipse>

  <g opacity="0.6">
    <path
      id="summaryWavePath"
      d="M-30 1260 C 140 1210, 280 1325, 430 1288 C 590 1248, 690 1148, 840 1188 C 930 1210, 1005 1270, 1120 1180"
      fill="none"
      stroke="url(#waveMain)"
      stroke-width="3.4"
      stroke-linecap="round"
    />
    <path
      d="M-20 1292 C 150 1258, 300 1342, 460 1314 C 610 1288, 720 1228, 860 1252 C 960 1268, 1020 1236, 1120 1188"
      fill="none"
      stroke="url(#waveSub)"
      stroke-width="1.8"
      stroke-linecap="round"
      opacity="0.85"
    />
  </g>

  <g>
    <circle cx="0" cy="0" r="17" fill="#66FBE1" opacity="0.2" filter="url(#dotBlur)">
      <animate attributeName="r" values="14;22;15;24;14" dur="10.8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.12;0.3;0.15;0.34;0.12" dur="10.8s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="6.2" fill="#7CFEE4">
      <animate attributeName="r" values="5.4;6.8;5.8;7.2;5.4" dur="10.8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.72;0.95;0.75;1;0.72" dur="10.8s" repeatCount="indefinite" />
    </circle>
    <animateMotion dur="10.8s" repeatCount="indefinite" rotate="auto">
      <mpath href="#summaryWavePath" />
    </animateMotion>
  </g>

  <rect width="1080" height="1920" fill="url(#bg)" opacity="0.06" />
</svg>
