<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#061236" />
      <stop offset="52%" stop-color="#02061A" />
      <stop offset="100%" stop-color="#010412" />
    </linearGradient>

    <radialGradient id="glowTop" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#2C7CFF" stop-opacity="0.24" />
      <stop offset="100%" stop-color="#2C7CFF" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="glowRight" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#30E8C4" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#30E8C4" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="glowBottom" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#17B88E" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#17B88E" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="waveMain" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#21468F" stop-opacity="0.34" />
      <stop offset="55%" stop-color="#22C9A5" stop-opacity="0.76" />
      <stop offset="100%" stop-color="#73F8D7" stop-opacity="0.72" />
    </linearGradient>

    <linearGradient id="waveSub" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A3675" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#3178FF" stop-opacity="0.36" />
    </linearGradient>

    <filter id="dotBlur" x="-220%" y="-220%" width="440%" height="440%">
      <feGaussianBlur stdDeviation="4.2" />
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)" />
  <rect width="1080" height="1920" fill="url(#bg)" opacity="0.18" />

  <ellipse cx="860" cy="1420" rx="380" ry="340" fill="url(#glowBottom)">
    <animate attributeName="cy" values="1430;1390;1430" dur="16s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.8;1;0.8" dur="16s" repeatCount="indefinite" />
  </ellipse>

  <ellipse cx="160" cy="260" rx="260" ry="210" fill="url(#glowTop)" opacity="0.9">
    <animate attributeName="cx" values="140;190;140" dur="18s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.75;1;0.75" dur="18s" repeatCount="indefinite" />
  </ellipse>

  <ellipse cx="980" cy="860" rx="300" ry="460" fill="url(#glowRight)" opacity="0.95">
    <animate attributeName="cy" values="900;820;900" dur="14s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.7;1;0.7" dur="14s" repeatCount="indefinite" />
  </ellipse>

  <g opacity="0.9">
    <path
      id="summaryWavePath"
      d="M-30 1080 C 140 1030, 280 1135, 430 1104 C 590 1070, 690 970, 840 1006 C 930 1028, 1005 1090, 1120 995"
      fill="none"
      stroke="url(#waveMain)"
      stroke-width="4.6"
      stroke-linecap="round"
    />
    <path
      d="M-20 1114 C 150 1080, 300 1162, 460 1138 C 610 1112, 720 1046, 860 1068 C 960 1084, 1020 1050, 1120 1002"
      fill="none"
      stroke="url(#waveSub)"
      stroke-width="2.4"
      stroke-linecap="round"
      opacity="0.85"
    />
  </g>

  <g>
    <circle cx="0" cy="0" r="20" fill="#66FBE1" opacity="0.24" filter="url(#dotBlur)">
      <animate attributeName="r" values="16;24;18;27;16" dur="10.8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.16;0.36;0.2;0.44;0.16" dur="10.8s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="7" fill="#7CFEE4">
      <animate attributeName="r" values="6;7.6;6.4;8;6" dur="10.8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.78;0.98;0.8;1;0.78" dur="10.8s" repeatCount="indefinite" />
    </circle>
    <animateMotion dur="10.8s" repeatCount="indefinite" rotate="auto">
      <mpath href="#summaryWavePath" />
    </animateMotion>
  </g>

  <rect width="1080" height="1920" fill="url(#bg)" opacity="0.06" />
</svg>
