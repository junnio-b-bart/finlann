<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/finlann/finlann-icon.png" />
    <link rel="apple-touch-icon" href="/finlann/finlann-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#020a2f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Finlann · Loading Preview</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #010412;
      }

      body {
        display: grid;
        place-items: center;
        position: relative;
        overflow: hidden;
        background: #010412 url("/finlann/src/assets/loading-background-v2.svg") center 20% / cover no-repeat;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", sans-serif;
      }

      body::before,
      body::after {
        content: "";
        position: absolute;
        inset: -12%;
        pointer-events: none;
        z-index: 0;
        filter: blur(14px);
        will-change: transform, opacity;
      }

      body::before {
        background:
          radial-gradient(38% 46% at 78% 33%, rgba(71, 234, 203, 0.34) 0%, rgba(71, 234, 203, 0.06) 46%, rgba(71, 234, 203, 0) 100%),
          radial-gradient(32% 42% at 58% 84%, rgba(42, 195, 226, 0.24) 0%, rgba(42, 195, 226, 0.04) 52%, rgba(42, 195, 226, 0) 100%);
        animation: loading-ambient-drift 9.2s ease-in-out infinite;
      }

      body::after {
        background:
          radial-gradient(36% 44% at 74% 41%, rgba(137, 255, 228, 0.2) 0%, rgba(137, 255, 228, 0.05) 48%, rgba(137, 255, 228, 0) 100%);
        animation: loading-ambient-breathe 5.8s ease-in-out infinite;
      }

      .loading-preview {
        height: 100dvh;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        z-index: 1;
      }

      .loading-brand {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transform: translateY(-15%);
        z-index: 2;
      }

      .loading-logo {
        width: 84px;
        height: auto;
      }

      .loading-brand-name {
        position: relative;
        display: inline-block;
        font-size: clamp(42px, 8.8vw, 62px);
        line-height: 1;
        font-weight: 600;
        letter-spacing: -0.02em;
        font-family: "Avenir Next", "SF Pro Display", "Poppins", "Inter", sans-serif;
        background: linear-gradient(100deg, #67e9a6 0%, #149d84 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-rendering: geometricPrecision;
      }

      @keyframes loading-ambient-drift {
        0% {
          transform: translate3d(0, 0, 0) scale(1);
          opacity: 0.58;
        }
        50% {
          transform: translate3d(-2.2%, 1.4%, 0) scale(1.035);
          opacity: 0.95;
        }
        100% {
          transform: translate3d(0, 0, 0) scale(1);
          opacity: 0.58;
        }
      }

      @keyframes loading-ambient-breathe {
        0% {
          transform: translate3d(0, 0, 0) scale(0.98);
          opacity: 0.24;
        }
        50% {
          transform: translate3d(1.2%, -1.3%, 0) scale(1.04);
          opacity: 0.74;
        }
        100% {
          transform: translate3d(0, 0, 0) scale(0.98);
          opacity: 0.24;
        }
      }

    </style>
  </head>
  <body>
    <main class="loading-preview">
      <div class="loading-brand" aria-label="Finlann">
        <img class="loading-logo" src="./src/assets/logo-f-mark.png" alt="" />
        <span class="loading-brand-name">Finlann</span>
      </div>
    </main>
  </body>
</html>
